<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Ramp</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="game">
    <section class="game-layout">

      <div class="lado-tabuleiro">

        <section class="topo-imagem">
          <img src="img/topo-pixel-ramp.png" alt="Pixel Ramp">
        </section>

        <section class="board-wrap">
          <div class="board-area">
  <div class="board" id="board"></div>

  <img class="board-line ladder-64-83" src="img/ladder.png" alt="">
  <img class="board-line snake-108-89" src="img/snake.png" alt="">
</div>
        </section>

      </div>

      <div class="lado-ui">

        <section class="config">
          <h2>Escolha os jogadores</h2>

          <div class="config-row">
            <label for="playerCount">Quantidade:</label>

            <select id="playerCount">
              <option value="3">3 jogadores</option>
              <option value="4">4 jogadores</option>
              <option value="5">5 jogadores</option>
              <option value="6">6 jogadores</option>
              <option value="7">7 jogadores</option>
              <option value="8">8 jogadores</option>
              <option value="9">9 jogadores</option>
              <option value="10">10 jogadores</option>
            </select>
          </div>

          <button id="startBtn">Começar jogo</button>
        </section>

        <section class="hud">
          <p><strong>Jogador atual:</strong> <span id="currentPlayer">-</span></p>
          <p><strong>Dado:</strong> <span id="diceResult">-</span></p>
          <button id="rollBtn" disabled>Jogar dado</button>
        </section>

        <section class="players" id="playersList"></section>

      </div>

    </section>
  </main>

  <div class="modal-evento" id="modalEvento">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">×</button>
      <p id="messageBox">Clique em começar jogo.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
